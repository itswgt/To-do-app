<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>To Do</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    /* Base */
    --bg:        #FAF8FC;
    --surface:   #FFFFFF;
    --surface2:  #F2EEF8;
    --border:    #E2D8F0;
    --text:      #2A2340;
    --muted:     #8A85A8;
    --red:       #B83030;
    --shadow:    0 2px 14px rgba(120,90,180,0.08);
    --shadow-lg: 0 6px 28px rgba(120,90,180,0.14);
    --radius:    14px;

    /* Task identity — soft pink */
    --task-bg:          #FFF0F4;
    --task-border:      #F0BCC8;
    --task-accent:      #D4607A;
    --task-accent-dark: #A03050;
    --task-badge-bg:    #FDDDE5;
    --task-badge-text:  #9B2A45;

    /* Note identity — soft lavender */
    --note-bg:          #F4F0FF;
    --note-border:      #C8BAF0;
    --note-accent:      #7C5CBF;
    --note-accent-dark: #4E2E99;
    --note-badge-bg:    #E8E0FA;
    --note-badge-text:  #5B3FA8;

    /* Done — muted neutral blend */
    --done-bg:          #F5F2FA;
    --done-border:      #D8D0EC;
    --done-accent:      #B0A8CC;

    /* Slate-blue — header & comments */
    --slate:            #4A6B8A;
    --slate-dark:       #345070;
    --slate-light:      #E8EFF6;
    --slate-border:     #B8CEDD;
    --slate-bubble:     #F0F5FA;

    /* Header */
    --header-bg:        #B0B8C8;
    --header-color:     #fff;

    /* Toggle */
    --toggle-track:     rgba(0,0,0,0.12);
    --toggle-thumb:     #fff;
  }

  [data-theme="dark"] {
    --bg:        #16131F;
    --surface:   #211D2E;
    --surface2:  #2A2540;
    --border:    #3A3356;
    --text:      #EDE8FA;
    --muted:     #7A7498;
    --shadow:    0 2px 14px rgba(0,0,0,0.35);
    --shadow-lg: 0 6px 28px rgba(0,0,0,0.5);

    --task-bg:          #2C1C28;
    --task-border:      #5A2E40;
    --task-badge-bg:    #3D1A2A;
    --task-badge-text:  #F09AB0;

    --note-bg:          #1E1830;
    --note-border:      #4A3880;
    --note-badge-bg:    #2A2040;
    --note-badge-text:  #B09AE8;

    --done-bg:          #1E1B2A;
    --done-border:      #3A3356;

    --slate:            #6A9BB8;
    --slate-dark:       #4A7A9A;
    --slate-light:      #1E2B38;
    --slate-border:     #3A5870;
    --slate-bubble:     #1A2530;

    --header-bg:        #1A1626;
    --header-color:     #EDE8FA;

    --toggle-track:     rgba(255,255,255,0.12);
    --toggle-thumb:     #EDE8FA;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.25s, color 0.25s;
  }

  /* Header */
  header {
    width: 100%;
    background: var(--header-bg);
    color: var(--header-color);
    padding: 22px 32px 18px;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    border-bottom: 3px solid rgba(0,0,0,0.08);
    transition: background 0.25s;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    letter-spacing: -1px;
    line-height: 1;
    flex: 1;
  }

  /* Dark mode toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
    cursor: pointer;
    user-select: none;
  }
  .theme-toggle-label {
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: var(--header-color);
    opacity: 0.75;
    letter-spacing: 0.03em;
  }
  .toggle-track {
    position: relative;
    width: 44px;
    height: 24px;
    background: var(--toggle-track);
    border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0.25);
    transition: background 0.25s, border-color 0.25s;
    flex-shrink: 0;
  }
  [data-theme="dark"] .toggle-track {
    background: rgba(108,80,200,0.5);
    border-color: rgba(255,255,255,0.18);
  }
  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--toggle-thumb);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), background 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
  }
  [data-theme="dark"] .toggle-thumb {
    transform: translateX(20px);
  }

  .btn-export {
    background: rgba(255,255,255,0.15);
    color: var(--header-color);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.17s;
    margin-bottom: 2px;
  }
  .btn-export:hover { background: rgba(255,255,255,0.28); }

  /* Main */
  main {
    width: 100%;
    max-width: 700px;
    padding: 28px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Stats */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 500;
    transition: background 0.25s, border-color 0.25s;
  }
  .stat-chip strong { color: var(--text); font-size: 1rem; margin-right: 4px; }

  /* Input panel */
  .input-panel {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: background 0.25s, border-color 0.25s;
  }
  .input-panel textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--text);
    background: var(--surface2);
    resize: none;
    outline: none;
    transition: border-color 0.2s, background 0.25s, color 0.25s;
    line-height: 1.6;
    min-height: 90px;
  }
  .input-panel textarea:focus { border-color: var(--note-accent); background: var(--surface); }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    cursor: pointer; border: none; border-radius: 8px;
    padding: 9px 18px; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 600;
    transition: background 0.18s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--task-accent); color: #fff; }
  .btn-primary:hover { background: var(--task-accent-dark); }
  .btn-note { background: var(--note-accent); color: #fff; }
  .btn-note:hover { background: var(--note-accent-dark); }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    cursor: pointer; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: 30px;
    padding: 6px 16px; font-size: 0.83rem;
    font-family: 'DM Sans', sans-serif; color: var(--muted);
    font-weight: 500; transition: all 0.17s;
  }
  .filter-btn:hover                        { background: var(--slate);        color: #fff; border-color: var(--slate); }
  .filter-btn.active                       { color: #fff; }
  .filter-btn.active[data-filter="all"]    { background: var(--slate);        border-color: var(--slate); }
  .filter-btn.active[data-filter="tasks"]  { background: var(--task-accent);  border-color: var(--task-accent); }
  .filter-btn.active[data-filter="notes"]  { background: var(--note-accent);  border-color: var(--note-accent); }
  .filter-btn.active[data-filter="done"]   { background: var(--slate);        border-color: var(--slate); }

  /* Cards container */
  #cards-container { display: flex; flex-direction: column; gap: 14px; }

  .card-wrapper { display: flex; flex-direction: column; gap: 6px; }
  .card-wrapper.dragging { opacity: 0.4; }
  .card-wrapper.drag-over > .card { outline: 2px dashed var(--note-accent); outline-offset: 2px; }

  .card {
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px 20px 14px; display: flex; flex-direction: column;
    gap: 10px; animation: slideIn 0.25s ease; transition: box-shadow 0.2s, background 0.25s, border-color 0.25s;
  }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card.task-card    { background: var(--task-bg);  border: 1.5px solid var(--task-border); border-left: 4px solid var(--task-accent); }
  .card.comment-only { background: var(--note-bg);  border: 1.5px solid var(--note-border); border-left: 4px solid var(--note-accent); }
  .card.done         { background: var(--task-bg);  border: 1.5px solid var(--task-border); border-left: 4px solid var(--task-accent); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Drag handle */
  .drag-handle {
    cursor: grab; color: #ccc; font-size: 1rem;
    padding: 2px 4px 2px 0; flex-shrink: 0;
    margin-top: 2px; user-select: none; line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: var(--muted); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; }

  /* Checkbox — pink */
  .task-cb {
    width: 20px; height: 20px; border-radius: 5px;
    border: 2px solid var(--task-accent); background: var(--surface);
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    appearance: none; -webkit-appearance: none;
    transition: background 0.15s, border-color 0.15s; position: relative;
  }
  .task-cb:checked { background: var(--task-accent); border-color: var(--task-accent); }
  .task-cb:checked::after {
    content: '✓'; position: absolute; color: #fff;
    font-size: 12px; top: 50%; left: 50%;
    transform: translate(-50%, -52%); font-weight: 700;
  }

  .task-text { flex: 1; font-size: 0.97rem; line-height: 1.5; font-weight: 500; word-break: break-word; color: var(--text); }
  .done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-text[contenteditable="true"] { outline: none; border-bottom: 2px solid var(--note-accent); padding-bottom: 2px; cursor: text; }
  .edit-hint { font-size: 0.72rem; color: var(--note-accent); margin-left: auto; font-style: italic; }

  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .timestamp { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .timestamp svg { opacity: 0.5; }

  .timestamps-done { display: flex; align-items: center; gap: 14px; font-family: 'DM Sans', sans-serif; }
  .ts-block { display: flex; align-items: center; gap: 5px; }
  .ts-divider { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
  .ts-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); }
  .ts-value { font-size: 0.73rem; font-weight: 500; white-space: nowrap; color: var(--text); }
  .ts-block:last-child .ts-label { color: #5A7A5A; }
  .ts-block:last-child .ts-value  { color: #3A5E3A; }
  [data-theme="dark"] .ts-block:last-child .ts-label { color: #6A9A6A; }
  [data-theme="dark"] .ts-block:last-child .ts-value  { color: #8ABA8A; }

  /* Pin button */
  .btn-pin { background: none; border: none; cursor: pointer; font-size: 0.95rem; line-height: 1; padding: 2px 4px; flex-shrink: 0; margin-top: 1px; opacity: 0.22; transition: opacity 0.15s, transform 0.15s; color: var(--text); }
  .btn-pin:hover { opacity: 0.55; transform: rotate(-20deg); }
  .btn-pin.pinned { opacity: 1; transform: rotate(-20deg); }
  .task-card    .btn-pin.pinned { color: var(--task-accent-dark); }
  .comment-only .btn-pin.pinned { color: var(--note-accent-dark); }

  /* Pinned task */
  .card.task-card.pinned-card { background: #FFE4EA; border-color: #E898AA; border-left-color: var(--task-accent-dark); box-shadow: 0 0 0 2px rgba(160,48,80,0.12), var(--shadow); }
  [data-theme="dark"] .card.task-card.pinned-card { background: #3A1828; border-color: #6A2840; }
  .card.task-card.pinned-card .badge-task { background: #F9B8C8; color: var(--task-accent-dark); }
  [data-theme="dark"] .card.task-card.pinned-card .badge-task { background: #4A1A2A; color: #F090A8; }

  /* Pinned note */
  .card.comment-only.pinned-card { background: #E8E0FA; border-color: #A890DC; border-left-color: var(--note-accent-dark); box-shadow: 0 0 0 2px rgba(78,46,153,0.13), var(--shadow); }
  [data-theme="dark"] .card.comment-only.pinned-card { background: #251840; border-color: #5A3898; }
  .card.comment-only.pinned-card .badge-note { background: #C8B8F0; color: var(--note-accent-dark); }
  [data-theme="dark"] .card.comment-only.pinned-card .badge-note { background: #301A50; color: #B090E8; }

  /* Pin section labels */
  .pin-section-label { font-size: 0.70rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 2px 0 4px 2px; display: flex; align-items: center; gap: 6px; }
  .pin-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); border-radius: 1px; }
  .pin-divider { margin-top: 4px; }
  .done-section-label {
    font-size: 0.70rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    padding: 6px 0 4px 2px; display: flex; align-items: center; gap: 6px;
    margin-top: 6px;
  }
  .done-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); border-radius: 1px; }

  /* Badges */
  .badge { font-size: 0.70rem; font-weight: 600; padding: 2px 9px; border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-task { background: var(--task-badge-bg);  color: var(--task-badge-text); }
  .badge-note { background: var(--note-badge-bg);  color: var(--note-badge-text); }
  .badge-done { background: #EAE6F4; color: #7A70A8; }
  [data-theme="dark"] .badge-done { background: #2A2540; color: #9A90C8; }

  .btn-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 1.1rem; line-height: 1; padding: 2px 4px; border-radius: 5px; transition: color 0.15s; margin-left: auto; }
  .btn-del:hover { color: var(--red); }

  .comment-toggle-bar { display: flex; justify-content: flex-end; padding-right: 4px; }
  .btn-toggle-comments {
    background: none; border: none; cursor: pointer;
    font-size: 0.78rem; font-family: 'DM Sans', sans-serif;
    color: var(--slate); font-weight: 600;
    padding: 3px 0; opacity: 0.7;
    transition: opacity 0.15s;
  }
  .btn-toggle-comments:hover { opacity: 1; }

  /* Comments timeline */
  .comments-section { padding-left: 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
  .comments-section::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; background: linear-gradient(to bottom, var(--slate), transparent); border-radius: 2px; opacity: 0.5; }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Comment bubbles */
  .comment-bubble { background: var(--slate-bubble); border-radius: 0 12px 12px 12px; padding: 9px 36px 9px 13px; font-size: 0.85rem; font-family: 'Courier New', Courier, monospace; color: var(--text); line-height: 1.5; position: relative; animation: bubbleIn 0.22s ease; border: 1.5px solid var(--slate-border); margin-left: 10px; transition: background 0.25s, border-color 0.25s; }
  .comment-bubble.new { animation: bubbleIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .comment-bubble::before { content: ''; position: absolute; top: 0; left: -9px; width: 0; height: 0; border-top: 9px solid var(--slate-border); border-left: 9px solid transparent; }
  .comment-bubble::after  { content: ''; position: absolute; top: 1.5px; left: -7px; width: 0; height: 0; border-top: 8px solid var(--slate-bubble); border-left: 8px solid transparent; }
  .comment-bubble .comment-ts { display: block; font-size: 0.70rem; color: var(--muted); margin-top: 5px; font-family: 'DM Sans', sans-serif; }
  .comment-bubble .btn-del-comment { position: absolute; top: 6px; right: 8px; background: none; border: none; cursor: pointer; color: #ccc; font-size: 0.9rem; transition: color 0.15s; }
  .comment-bubble .btn-del-comment:hover { color: var(--red); }

  /* Comment input */
  .add-comment-row { display: flex; align-items: center; margin-left: 30px; background: var(--slate-bubble); border: 1.5px solid var(--slate-border); border-radius: 10px; overflow: hidden; transition: border-color 0.18s, box-shadow 0.18s, background 0.25s; }
  .add-comment-row:focus-within { border-color: var(--slate); box-shadow: 0 0 0 3px rgba(74,107,138,0.13); }
  .add-comment-row input { flex: 1; border: none; padding: 9px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; background: transparent; outline: none; color: var(--text); }
  .add-comment-row input::placeholder { color: var(--muted); }
  .btn-add-c { background: none; border: none; border-left: 1.5px solid var(--slate-border); color: var(--slate); cursor: pointer; padding: 9px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .btn-add-c:hover { background: var(--slate); color: #fff; }

  .clear-done-bar { display: flex; justify-content: flex-end; }
  .btn-clear-done { background: none; border: 1.5px solid #E0A8B0; border-radius: 8px; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; padding: 6px 14px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .btn-clear-done:hover { background: var(--red); color: #fff; border-color: var(--red); }

  .empty-state { text-align: center; padding: 48px 0 24px; color: var(--muted); font-size: 0.92rem; }
  .empty-state .icon { font-size: 2.4rem; margin-bottom: 10px; }

  .empty-done { text-align: center; padding: 52px 20px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .done-circles { display: flex; gap: 10px; justify-content: center; margin-bottom: 4px; }
  .circle { width: 38px; height: 38px; border-radius: 50%; border: 2.5px dashed var(--border); animation: pulse-circle 2s ease-in-out infinite; }
  .circle:nth-child(1) { animation-delay: 0s;   border-color: var(--task-border); }
  .circle:nth-child(2) { animation-delay: 0.3s; border-color: var(--note-border); }
  .circle:nth-child(3) { animation-delay: 0.6s; border-color: var(--done-border); }
  @keyframes pulse-circle {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.12); }
  }
  .empty-done h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
  .empty-done p  { font-size: 0.88rem; color: var(--muted); max-width: 260px; line-height: 1.5; }

  #loader { text-align: center; padding: 20px; color: var(--muted); font-size: 0.85rem; display: none; }

  /* Undo Toast */
  #undo-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 11px 20px; border-radius: 10px; font-size: 0.88rem; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 14px; box-shadow: 0 6px 24px rgba(0,0,0,0.22); opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 999; white-space: nowrap; overflow: hidden; }
  #undo-toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
  .undo-btn { background: var(--slate); border: none; border-radius: 6px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 700; padding: 4px 12px; cursor: pointer; transition: background 0.15s; }
  .undo-btn:hover { background: var(--slate-dark); }
  .toast-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(to right, var(--slate), var(--task-accent)); border-radius: 0 0 10px 10px; width: 100%; transform-origin: left; }
  #undo-toast.show .toast-bar { animation: shrink 5s linear forwards; }
  @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
</style>
</head>
<body>

<header>
  <h1>To Do</h1>
  <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:2px;">
    <!-- Dark mode toggle -->
    <div class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <span class="theme-toggle-label" id="theme-label">Light</span>
      <div class="toggle-track">
        <div class="toggle-thumb" id="toggle-thumb">☀️</div>
      </div>
    </div>
    <button class="btn-export" onclick="exportData()">Export</button>
    <button class="btn-export" onclick="document.getElementById('import-input').click()">Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="input-panel">
    <textarea id="main-input" rows="3"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addTask()">Add Task</button>
      <button class="btn btn-note"    onclick="addNote()">Add Note</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all"   onclick="setFilter('all',this)">All</button>
    <button class="filter-btn"        data-filter="tasks" onclick="setFilter('tasks',this)">Tasks</button>
    <button class="filter-btn"        data-filter="notes" onclick="setFilter('notes',this)">Notes</button>
    <button class="filter-btn"        data-filter="done"  onclick="setFilter('done',this)">Done</button>
  </div>

  <div id="cards-container"></div>
  <div id="loader">Loading more&hellip;</div>
</main>

<div id="undo-toast">
  <span id="undo-msg">Item deleted</span>
  <button class="undo-btn" onclick="undoDelete()">Undo</button>
  <div class="toast-bar"></div>
</div>

<script>
  // ── Theme ─────────────────────────────────────────────────
  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('theme-label').textContent = dark ? 'Dark' : 'Light';
    document.getElementById('toggle-thumb').textContent = dark ? '🌙' : '☀️';
    localStorage.setItem('taskflow_theme', dark ? 'dark' : 'light');
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
  }

  // Apply saved theme on load
  const savedTheme = localStorage.getItem('taskflow_theme');
  if (savedTheme === 'dark') applyTheme(true);

  // ── Data ──────────────────────────────────────────────────
  let items     = JSON.parse(localStorage.getItem('taskflow_items') || '[]');
  let filter    = 'all';
  const PAGE    = 15;
  let page      = 1;
  let rendering = false;

  function save() { localStorage.setItem('taskflow_items', JSON.stringify(items)); }
  function now()  { return new Date().toISOString(); }
  function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function fmt(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
         + ' \u00B7 '
         + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Add items ─────────────────────────────────────────────
  function addTask() {
    const val = document.getElementById('main-input').value.trim();
    if (!val) { flash(); return; }
    items.unshift({ id:uid(), type:'task', text:val, done:false, ts:now(), comments:[] });
    document.getElementById('main-input').value = '';
    save(); page=1; renderAll();
  }

  function addNote() {
    const val = document.getElementById('main-input').value.trim();
    if (!val) { flash(); return; }
    items.unshift({ id:uid(), type:'note', text:val, ts:now() });
    document.getElementById('main-input').value = '';
    save(); page=1; renderAll();
  }

  function flash() {
    const ta = document.getElementById('main-input');
    ta.style.borderColor = '#e07070';
    setTimeout(() => { ta.style.borderColor = ''; }, 1500);
  }

  // ── Toggle done ───────────────────────────────────────────
  function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.done = !item.done;
    if (item.done) {
      item.completedAt  = now();
      item.originalIndex = items.indexOf(item);
      items = items.filter(i => i.id !== id);
      items.push(item);
    } else {
      delete item.completedAt;
      const target = typeof item.originalIndex === 'number'
        ? Math.min(item.originalIndex, items.length)
        : 0;
      delete item.originalIndex;
      items = items.filter(i => i.id !== id);
      items.splice(target, 0, item);
    }
    save(); renderAll();
  }

  // ── Undo delete ───────────────────────────────────────────
  let deletedItem  = null;
  let deletedIndex = null;
  let toastTimer   = null;

  function deleteItem(id) {
    const idx = items.findIndex(i => i.id === id);
    if (idx === -1) return;
    deletedItem  = items[idx];
    deletedIndex = idx;
    items.splice(idx, 1);
    save(); page=1; renderAll();
    const label = deletedItem.text.length > 32 ? deletedItem.text.slice(0,32)+'...' : deletedItem.text;
    showToast('"' + label + '" deleted');
  }

  function undoDelete() {
    if (!deletedItem) return;
    items.splice(deletedIndex, 0, deletedItem);
    deletedItem = null; deletedIndex = null;
    save(); page=1; renderAll();
    hideToast();
  }

  function showToast(msg) {
    clearTimeout(toastTimer);
    const toast = document.getElementById('undo-toast');
    const bar   = toast.querySelector('.toast-bar');
    document.getElementById('undo-msg').textContent = msg;
    bar.style.animation = 'none';
    toast.classList.remove('show');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bar.style.animation = '';
      toast.classList.add('show');
    }));
    toastTimer = setTimeout(() => {
      hideToast(); deletedItem = null; deletedIndex = null;
    }, 5000);
  }

  function hideToast() {
    clearTimeout(toastTimer);
    document.getElementById('undo-toast').classList.remove('show');
  }

  // ── Comments ──────────────────────────────────────────────
  function addCommentToItem(id) {
    const inp = document.getElementById('ci-' + id);
    const val = inp.value.trim();
    if (!val) return;
    const item = items.find(i => i.id === id);
    if (!item) return;
    if (!item.comments) item.comments = [];
    const c = { id:uid(), text:val, ts:now() };
    item.comments.push(c);
    inp.value = '';
    save();

    const section = document.getElementById('cs-' + id);
    if (section) {
      const bubble = document.createElement('div');
      bubble.className = 'comment-bubble new';
      bubble.innerHTML =
        escHtml(c.text) +
        '<span class="comment-ts">' + fmt(c.ts) + '</span>' +
        '<button class="btn-del-comment" onclick="deleteComment(\'' + id + '\',\'' + c.id + '\')" title="Delete">\u2715</button>';
      section.appendChild(bubble);
      bubble.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }

    const tog = document.getElementById('tog-' + id);
    if (tog) {
      const count = item.comments.length;
      tog.textContent = '\uD83D\uDCAC ' + count + ' comment' + (count !== 1 ? 's' : '');
    }
  }

  function clearDone() {
    if (!confirm('Delete all completed tasks? This cannot be undone.')) return;
    items = items.filter(i => !(i.type === 'task' && i.done));
    save(); page=1; renderAll();
  }

  // ── Pin ───────────────────────────────────────────────────
  function togglePin(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.pinned = !item.pinned;
    save(); renderAll();
  }

  function deleteComment(itemId, commentId) {
    const item = items.find(i => i.id === itemId);
    if (item) { item.comments = item.comments.filter(c => c.id !== commentId); save(); renderAll(); }
  }

  // ── Filter ────────────────────────────────────────────────
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    page=1; renderAll();
  }

  function filtered() {
    let list;
    switch(filter) {
      case 'tasks': list = items.filter(i => i.type === 'task'); break;
      case 'notes': list = items.filter(i => i.type === 'note'); break;
      case 'done':  list = items.filter(i => i.type === 'task' && i.done); break;
      default:      list = items;
    }
    return [...list.filter(i => i.pinned), ...list.filter(i => !i.pinned)];
  }

  function emptyState(title, msg) {
    return '<div class="empty-done">' +
      '<div class="done-circles"><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>' +
      '<h3>' + title + '</h3>' +
      '<p>' + msg + '</p>' +
    '</div>';
  }

  // ── Render ────────────────────────────────────────────────
  function renderAll() {
    const list = filtered();
    const con  = document.getElementById('cards-container');
    con.innerHTML = '';

    if (list.length === 0) {
      const states = {
        all:   ['Nothing here yet',   'Add your first task or note above to get started.'],
        tasks: ['No tasks yet',        'Add Task and start ticking things off.'],
        notes: ['No notes yet',        'Add Note to jot down anything on your mind.'],
        done:  ['Nothing done yet',    'Check off a task and it\'ll show up here. You\'ve got this.'],
      };
      const [title, msg] = states[filter] || states.all;
      con.innerHTML = emptyState(title, msg);
    } else {
      if (filter === 'done') {
        const bar = document.createElement('div');
        bar.className = 'clear-done-bar';
        bar.innerHTML = '<button class="btn-clear-done" onclick="clearDone()">Clear All Completed</button>';
        con.appendChild(bar);
      }
      const visible = list.slice(0, page * PAGE);
      const pinnedCount = visible.filter(i => i.pinned).length;
      const unpinnedLabel = filter === 'notes' ? 'Notes' : filter === 'done' ? 'Completed' : 'Tasks';

      const showDoneDivider = (filter === 'all' || filter === 'tasks');
      const activeItems = showDoneDivider ? visible.filter(i => !(i.type === 'task' && i.done)) : visible;
      const doneItems   = showDoneDivider ? visible.filter(i => i.type === 'task' && i.done)    : [];

      const renderItems = (itemList, startIdx) => {
        itemList.forEach((item, i) => {
          const idx = startIdx + i;
          if (pinnedCount > 0 && idx === pinnedCount) {
            const divider = document.createElement('div');
            divider.className = 'pin-section-label pin-divider';
            divider.textContent = unpinnedLabel;
            con.appendChild(divider);
          }
          con.appendChild(buildCard(item));
        });
      };

      if (showDoneDivider) {
        renderItems(activeItems, 0);
        if (doneItems.length > 0) {
          const doneDiv = document.createElement('div');
          doneDiv.className = 'done-section-label';
          doneDiv.textContent = 'Completed';
          con.appendChild(doneDiv);
          doneItems.forEach(item => con.appendChild(buildCard(item)));
        }
      } else {
        renderItems(visible, 0);
      }

      if (pinnedCount > 0) {
        const label = document.createElement('div');
        label.className = 'pin-section-label';
        label.textContent = 'Pinned';
        con.insertBefore(label, con.children[filter === 'done' ? 1 : 0]);
      }
      initDrag();
    }

    document.getElementById('loader').style.display =
      list.length > page * PAGE ? 'block' : 'none';
    renderStats();
  }

  function renderStats() {
    const tasks = items.filter(i => i.type === 'task');
    const done  = tasks.filter(i => i.done);
    const notes = items.filter(i => i.type === 'note');
    document.getElementById('stats').innerHTML =
      '<div class="stat-chip"><strong>' + tasks.length + '</strong> Tasks</div>' +
      '<div class="stat-chip"><strong>' + done.length  + '</strong> Done</div>'  +
      '<div class="stat-chip"><strong>' + notes.length + '</strong> Notes</div>';
  }

  // ── Build card ────────────────────────────────────────────
  function buildCard(item) {
    const isTask = item.type === 'task';

    const wrapper = document.createElement('div');
    wrapper.className  = 'card-wrapper';
    wrapper.id         = 'wrap-' + item.id;
    wrapper.draggable  = true;
    wrapper.dataset.id = item.id;

    const card = document.createElement('div');
    card.className = 'card ' + (isTask ? 'task-card' : 'comment-only') + (item.done ? ' done' : '') + (item.pinned ? ' pinned-card' : '');
    card.id = 'card-' + item.id;

    const pinBtn = '<button class="btn-pin' + (item.pinned ? ' pinned' : '') + '" onclick="togglePin(\'' + item.id + '\')" title="' + (item.pinned ? 'Unpin' : 'Pin') + '">&#x1F4CC;</button>';

    const badge = isTask
      ? (item.done ? '<span class="badge badge-done">Done</span>' : '<span class="badge badge-task">Task</span>')
      : '<span class="badge badge-note">Note</span>';

    const cb = isTask
      ? '<input class="task-cb" type="checkbox"' + (item.done ? ' checked' : '') + ' onchange="toggleDone(\'' + item.id + '\')">'
      : '<span style="display:inline-block;width:20px;height:20px;flex-shrink:0;"></span>';

    const clock = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

    const timestampHtml = (isTask && item.done && item.completedAt)
      ? '<div class="timestamps-done">' +
          '<div class="ts-block">' +
            '<span class="ts-label">Created</span>' +
            '<span class="ts-value">' + fmt(item.ts) + '</span>' +
          '</div>' +
          '<div class="ts-divider"></div>' +
          '<div class="ts-block">' +
            '<span class="ts-label">Completed</span>' +
            '<span class="ts-value">' + fmt(item.completedAt) + '</span>' +
          '</div>' +
        '</div>'
      : '<span class="timestamp">' + clock + fmt(item.ts) + '</span>';

    card.innerHTML =
      '<div class="card-header">' +
        '<span class="drag-handle" title="Drag to reorder">\u28BF</span>' +
        cb +
        '<div class="task-text" id="txt-' + item.id + '" ondblclick="startEdit(\'' + item.id + '\')">' + escHtml(item.text) + '</div>' +
        pinBtn +
        '<button class="btn-del" onclick="deleteItem(\'' + item.id + '\')">\u2715</button>' +
      '</div>' +
      '<div class="card-meta">' +
        badge +
        timestampHtml +
        '<span class="edit-hint" id="hint-' + item.id + '" style="display:none">double-click to edit &middot; Enter to save</span>' +
      '</div>';

    wrapper.appendChild(card);

    if (isTask) {
      const bubblesHtml = (item.comments||[]).map(c =>
        '<div class="comment-bubble">' +
          escHtml(c.text) +
          '<span class="comment-ts">' + fmt(c.ts) + '</span>' +
          '<button class="btn-del-comment" onclick="deleteComment(\'' + item.id + '\',\'' + c.id + '\')">\u2715</button>' +
        '</div>'
      ).join('');

      const area = document.createElement('div');
      area.className = 'comment-area';
      area.id = 'area-' + item.id;
      area.style.display = 'none';
      area.innerHTML =
        '<div class="comments-section" id="cs-' + item.id + '">' + bubblesHtml + '</div>' +
        '<div class="add-comment-row">' +
          '<input id="ci-' + item.id + '" type="text" placeholder="Add a comment\u2026" onkeydown="if(event.key===\'Enter\')addCommentToItem(\'' + item.id + '\')">' +
          '<button class="btn-add-c" onclick="addCommentToItem(\'' + item.id + '\')">\u21A9 Comment</button>' +
        '</div>';

      const toggleBar = document.createElement('div');
      toggleBar.className = 'comment-toggle-bar';
      const count = (item.comments||[]).length;
      toggleBar.innerHTML =
        '<button class="btn-toggle-comments" id="tog-' + item.id + '" onclick="toggleComments(\'' + item.id + '\')">' +
          '\uD83D\uDCAC ' + (count > 0 ? count + ' comment' + (count !== 1 ? 's' : '') : 'Add comment') +
        '</button>';
      wrapper.appendChild(toggleBar);
      wrapper.appendChild(area);
    }

    return wrapper;
  }

  // ── Toggle comments ───────────────────────────────────────
  function toggleComments(id) {
    const area = document.getElementById('area-' + id);
    const btn  = document.getElementById('tog-' + id);
    if (!area) return;
    const open = area.style.display === 'none';
    area.style.display = open ? 'flex' : 'none';
    area.style.flexDirection = 'column';
    area.style.gap = '6px';
    if (open) {
      btn.style.opacity = '1';
      const inp = document.getElementById('ci-' + id);
      if (inp) setTimeout(() => inp.focus(), 50);
    } else {
      btn.style.opacity = '';
    }
  }

  function startEdit(id) {
    const el   = document.getElementById('txt-' + id);
    const hint = document.getElementById('hint-' + id);
    if (!el) return;
    el.contentEditable = 'true';
    el.focus();
    const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
    const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
    if (hint) hint.style.display = 'inline';
    el.onkeydown = e => { if (e.key==='Enter'){e.preventDefault();saveEdit(id);} if(e.key==='Escape')cancelEdit(id); };
    el.onblur = () => saveEdit(id);
  }

  function saveEdit(id) {
    const el   = document.getElementById('txt-' + id);
    const hint = document.getElementById('hint-' + id);
    if (!el || el.contentEditable !== 'true') return;
    el.contentEditable = 'false'; el.onblur = null;
    if (hint) hint.style.display = 'none';
    const newText = el.innerText.trim();
    if (!newText) { renderAll(); return; }
    const item = items.find(i => i.id === id);
    if (item) { item.text = newText; save(); }
  }

  function cancelEdit(id) {
    const el   = document.getElementById('txt-' + id);
    const hint = document.getElementById('hint-' + id);
    if (!el) return;
    el.contentEditable = 'false'; el.onblur = null;
    const item = items.find(i => i.id === id);
    if (item) el.innerText = item.text;
    if (hint) hint.style.display = 'none';
  }

  // ── Drag & drop ───────────────────────────────────────────
  let dragSrcId = null;

  function initDrag() {
    const con = document.getElementById('cards-container');
    con.querySelectorAll('.card-wrapper').forEach(w => {
      w.addEventListener('dragstart', e => { dragSrcId = w.dataset.id; w.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      w.addEventListener('dragend',   ()  => { w.classList.remove('dragging'); con.querySelectorAll('.card-wrapper').forEach(x=>x.classList.remove('drag-over')); });
      w.addEventListener('dragover',  e  => { e.preventDefault(); e.dataTransfer.dropEffect='move'; con.querySelectorAll('.card-wrapper').forEach(x=>x.classList.remove('drag-over')); if(w.dataset.id!==dragSrcId) w.classList.add('drag-over'); });
      w.addEventListener('drop', e => {
        e.preventDefault();
        if (!dragSrcId || w.dataset.id === dragSrcId) return;
        const si = items.findIndex(i=>i.id===dragSrcId);
        const ti = items.findIndex(i=>i.id===w.dataset.id);
        if (si===-1||ti===-1) return;
        const [moved] = items.splice(si,1); items.splice(ti,0,moved);
        save(); renderAll();
      });
    });
  }

  // ── Infinite scroll ───────────────────────────────────────
  new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !rendering) {
      const list = filtered();
      if (page * PAGE < list.length) {
        rendering = true;
        setTimeout(() => {
          page++;
          const con = document.getElementById('cards-container');
          list.slice((page-1)*PAGE, page*PAGE).forEach(item => con.appendChild(buildCard(item)));
          document.getElementById('loader').style.display = page*PAGE < list.length ? 'block' : 'none';
          initDrag(); rendering = false;
        }, 300);
      }
    }
  }, { threshold: 0.1 }).observe(document.getElementById('loader'));

  // ── Export / Import ───────────────────────────────────────
  function exportData() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(items,null,2)], {type:'application/json'}));
    a.download = 'todo-export.json'; a.click(); URL.revokeObjectURL(a.href);
  }

  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const p = JSON.parse(ev.target.result);
        if (!Array.isArray(p)) throw new Error();
        items = p; save(); page=1; renderAll();
      } catch { alert('Invalid file.'); }
    };
    r.readAsText(file); e.target.value = '';
  }

  // ── Enter shortcut ────────────────────────────────────────
  document.getElementById('main-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (filter === 'notes') { addNote(); } else { addTask(); }
    }
  });

  renderAll();
</script>
</body>
</html>
